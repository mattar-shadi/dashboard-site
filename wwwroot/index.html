<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <script>
        (function () {
            let saved = null;
            try {
                saved = localStorage.getItem('theme');
            } catch (e) {
                saved = null;
            }
            const allowedThemes = ['dark', 'light'];
            const isValidSaved = typeof saved === 'string' && allowedThemes.indexOf(saved) !== -1;
            if (isValidSaved) {
                document.documentElement.setAttribute('data-theme', saved);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
        })();
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — NexusDash</title>
    <base href="/" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        Une erreur inattendue s'est produite.
        <a href="" class="reload">Recharger</a>
        <button type="button" class="dismiss" aria-label="Fermer le message d’erreur">🗙</button>
    </div>
    <script src="js/main.js"></script>
    <script>
      (function(l) {
        if (l.search.length > 2 && l.search[1] === 'p' && l.search[2] === '=') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
