<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Moderne 2026 - Corrigé</title>
  
  <!-- Font Awesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  
  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg-dark: #0f172a;
      --bg-sidebar: #111827;
      --bg-card: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --sidebar-width: 260px;
      --header-height: 70px;
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-sidebar);
      border-right: 1px solid #1e293b;
      position: fixed;
      top: 0; bottom: 0; left: 0;
      z-index: 1001;
      transition: var(--transition);
      display: flex;
      flex-direction: column;
    }

    .logo {
      height: var(--header-height);
      display: flex; align-items: center;
      padding: 0 1.5rem;
      font-size: 1.4rem; font-weight: 800; color: white;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .logo i { color: var(--primary); margin-right: 0.75rem; }

    .nav-menu { padding: 1.5rem 0.75rem; flex: 1; }
    .nav-link {
      display: flex; align-items: center;
      padding: 0.8rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      border-radius: 8px;
      margin-bottom: 0.3rem;
      transition: var(--transition);
    }
    .nav-link:hover, .nav-link.active { background: rgba(99, 102, 241, 0.1); color: white; }
    .nav-link.active { background: var(--primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
    .nav-link i { width: 24px; margin-right: 0.8rem; text-align: center; }

    /* MAIN CONTENT */
    .main-wrapper {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      transition: var(--transition);
    }

    /* HEADER */
    header {
      height: var(--header-height);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 1.5rem;
      position: sticky; top: 0; z-index: 1000;
    }

    /* MOBILE TOGGLE BUTTON - ALWAYS VISIBLE ON SMALL SCREENS */
    .mobile-toggle {
      display: none;
      background: var(--bg-card);
      border: 1px solid #334155;
      color: white;
      padding: 0.5rem 0.7rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .user-profile { display: flex; align-items: center; gap: 0.8rem; }
    .user-profile img { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--primary); }

    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }
    h1 { font-size: 1.6rem; margin-bottom: 1.5rem; }

    /* GRID & CARDS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem; margin-bottom: 2rem;
    }
    .card { background: var(--bg-card); border: 1px solid #334155; border-radius: 12px; padding: 1.2rem; }
    .stat-val { font-size: 1.6rem; font-weight: 700; display: block; margin: 0.5rem 0; }
    .stat-label { color: var(--text-muted); font-size: 0.9rem; }

    .content-grid {
      display: grid; grid-template-columns: 2fr 1fr; gap: 1.2rem;
    }
    .chart-container { height: 300px; position: relative; margin-top: 1rem; }

    /* TABLE */
    .table-responsive { overflow-x: auto; margin-top: 1rem; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { text-align: left; padding: 0.8rem; color: var(--text-muted); border-bottom: 1px solid #334155; font-size: 0.8rem; text-transform: uppercase; }
    td { padding: 0.8rem; border-bottom: 1px solid rgba(51, 65, 85, 0.5); font-size: 0.9rem; }

    /* MOBILE RESPONSIVENESS */
    @media (max-width: 992px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-wrapper { margin-left: 0; }
      .mobile-toggle { display: block; }
      .content-grid { grid-template-columns: 1fr; }
    }

    /* OVERLAY */
    .overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 1000;
    }
    .overlay.active { display: block; }

  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <i class="fas fa-chart-line"></i>
      <span>DashBoard</span>
    </div>
    <nav class="nav-menu">
      <a href="#" class="nav-link active"><i class="fas fa-home"></i> Accueil</a>
      <a href="#" class="nav-link"><i class="fas fa-chart-pie"></i> Statistiques</a>
      <a href="#" class="nav-link"><i class="fas fa-users"></i> Clients</a>
      <a href="#" class="nav-link"><i class="fas fa-shopping-cart"></i> Commandes</a>
      <a href="#" class="nav-link"><i class="fas fa-cog"></i> Paramètres</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main-wrapper">
    <header>
      <button class="mobile-toggle" id="menuBtn">
        <i class="fas fa-bars"></i> Menu
      </button>
      <div class="user-profile">
        <span style="font-size: 0.9rem; font-weight: 500;">Thomas Martin</span>
        <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="User">
      </div>
    </header>

    <main>
      <h1>Tableau de Bord</h1>

      <div class="stats-grid">
        <div class="card">
          <span class="stat-label">Revenus Mensuels</span>
          <span class="stat-val">148 240 €</span>
          <span style="color: var(--success); font-size: 0.8rem;"><i class="fas fa-arrow-up"></i> +12%</span>
        </div>
        <div class="card">
          <span class="stat-label">Nouveaux Clients</span>
          <span class="stat-val">2 847</span>
          <span style="color: var(--success); font-size: 0.8rem;"><i class="fas fa-arrow-up"></i> +8%</span>
        </div>
        <div class="card">
          <span class="stat-label">Commandes</span>
          <span class="stat-val">1 394</span>
          <span style="color: var(--danger); font-size: 0.8rem;"><i class="fas fa-arrow-down"></i> -2%</span>
        </div>
      </div>

      <div class="content-grid">
        <div class="card">
          <h3>Évolution des Ventes</h3>
          <div class="chart-container">
            <canvas id="salesChart"></canvas>
          </div>
        </div>
        <div class="card">
          <h3>Dernières Transactions</h3>
          <div class="table-responsive">
            <table>
              <thead>
                <tr><th>Client</th><th>Montant</th></tr>
              </thead>
              <tbody>
                <tr><td>Thomas Martin</td><td>2 450 €</td></tr>
                <tr><td>Sophie Dubois</td><td>980 €</td></tr>
                <tr><td>Lucas Bernard</td><td>3 120 €</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Toggle Menu
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    function toggleMenu() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    }

    menuBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);

    // Close menu when clicking a link (mobile)
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 992) toggleMenu();
      });
    });

    // Chart
    const ctx = document.getElementById('salesChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin'],
        datasets: [{
          label: 'Ventes (€)',
          data: [12000, 19000, 15000, 25000, 22000, 30000],
          borderColor: '#6366f1',
          tension: 0.4,
          fill: true,
          backgroundColor: 'rgba(99, 102, 241, 0.1)'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
          x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
        }
      }
    });
  </script>
</body>
</html>
